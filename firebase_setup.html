<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ODAC · Configuracion Firebase</title>
  <style>
    :root{
      --bg:#0a0f18; --panel:#121b2a; --edge:rgba(255,255,255,.14);
      --txt:#e8edf6; --muted:rgba(232,237,246,.68); --acc:#3b82f6; --ok:#22c55e;
    }
    *{ box-sizing:border-box; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; }
    body{ margin:0; background:var(--bg); color:var(--txt); padding:20px; }
    .wrap{ max-width:760px; margin:0 auto; }
    .card{ background:var(--panel); border:1px solid var(--edge); border-radius:14px; padding:16px; }
    h1{ margin:0 0 10px; font-size:20px; }
    p{ margin:0 0 14px; color:var(--muted); }
    .grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .full{ grid-column:1/-1; }
    label{ font-size:12px; color:var(--muted); display:block; margin:2px 0 6px; }
    input{ width:100%; background:#0d1420; color:var(--txt); border:1px solid var(--edge); border-radius:10px; padding:10px 12px; }
    .row{ margin-top:12px; display:flex; gap:8px; flex-wrap:wrap; }
    button{ border:1px solid var(--edge); border-radius:10px; padding:10px 12px; background:#172338; color:var(--txt); font-weight:700; cursor:pointer; }
    .acc{ background:rgba(59,130,246,.25); }
    .ok{ background:rgba(34,197,94,.25); }
    .status{ margin-top:10px; font-size:13px; color:var(--muted); white-space:pre-wrap; }
    @media (max-width:700px){ .grid{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Configuracion Firebase (ODAC)</h1>
      <p>Rellena los datos del nuevo proyecto Firebase y pulsa Guardar. Se almacenan en este navegador y los usara toda la app.</p>

      <div class="grid">
        <div class="full">
          <label for="apiKey">apiKey</label>
          <input id="apiKey" />
        </div>
        <div>
          <label for="authDomain">authDomain</label>
          <input id="authDomain" />
        </div>
        <div>
          <label for="projectId">projectId</label>
          <input id="projectId" />
        </div>
        <div>
          <label for="storageBucket">storageBucket</label>
          <input id="storageBucket" />
        </div>
        <div>
          <label for="messagingSenderId">messagingSenderId</label>
          <input id="messagingSenderId" />
        </div>
        <div class="full">
          <label for="appId">appId</label>
          <input id="appId" />
        </div>
      </div>

      <div class="row">
        <button id="btnSave" class="acc">Guardar configuracion</button>
        <button id="btnLoad">Cargar guardada</button>
        <button id="btnClear">Borrar configuracion</button>
        <button id="btnOpen" class="ok">Abrir panel</button>
      </div>

      <div id="status" class="status"></div>
    </div>
  </div>

  <script>
    const KEY = "odac_firebase_config";
    const $ = (id)=>document.getElementById(id);
    const fields = ["apiKey","authDomain","projectId","storageBucket","messagingSenderId","appId"];

    function readForm(){
      const o = {};
      for (const k of fields) o[k] = String($(k).value || "").trim();
      return o;
    }
    function writeForm(o){
      for (const k of fields) $(k).value = String((o && o[k]) || "");
    }
    function valid(o){
      return !!(o.apiKey && o.authDomain && o.projectId && o.appId);
    }
    function setStatus(msg){ $("status").textContent = msg; }

    $("btnSave").addEventListener("click", ()=>{
      const cfg = readForm();
      if (!valid(cfg)) {
        setStatus("Faltan campos obligatorios: apiKey, authDomain, projectId y appId.");
        return;
      }
      localStorage.setItem(KEY, JSON.stringify(cfg));
      setStatus("Configuracion guardada.\nProyecto: " + cfg.projectId);
    });

    $("btnLoad").addEventListener("click", ()=>{
      try{
        const raw = localStorage.getItem(KEY);
        if (!raw) { setStatus("No hay configuracion guardada."); return; }
        const cfg = JSON.parse(raw);
        writeForm(cfg);
        setStatus("Configuracion cargada.");
      }catch(_){
        setStatus("No se pudo leer la configuracion guardada.");
      }
    });

    $("btnClear").addEventListener("click", ()=>{
      localStorage.removeItem(KEY);
      writeForm({});
      setStatus("Configuracion eliminada. La app volvera al fallback actual.");
    });

    $("btnOpen").addEventListener("click", ()=>{
      location.href = "./index.html";
    });

    // Autoload inicial
    try{
      const raw = localStorage.getItem(KEY);
      if (raw) writeForm(JSON.parse(raw));
    }catch(_){}
  </script>
</body>
</html>
